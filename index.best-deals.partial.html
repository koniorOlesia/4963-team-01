<section class="best-deals">
  <h2 class="best-deals__title">Best deals</h2>
  <p class="best-deals__subtitle">Wines to Every Table</p>

  <img
    class="best-deals__illustration"
    src="img/illustration.svg"
    alt=""
  />
  <p class="best-deals__paragraph">
    Shop our best-selling wines. Click on the product images to see the details.
  </p>

  <div class="best-deals__carousel">
    <article class="best-deals__carousel-item">
      <img
        width="360"
        class="best-deals__carousel-item__image"
        src="img/wines/Cabernet.jpg"
        alt="Bottle of red wine with a white label reading “WINE” grape illustration, and “Cabernet” text on a dark background."
      />
      <h3 class="best-deals__carousel-item__name">Cabernet</h3>
      <p class="best-deals__carousel-item__price">17,00 USD</p>
      <button class="best-deals__carousel-item__button">Add to Cart</button>
    </article>
    <article class="best-deals__carousel-item">
      <img
        width="360"
        class="best-deals__carousel-item__image"
        src="img/wines/Sauvignon-Blanc.jpg"
        alt="Bottle of white wine with a white label reading “WINE,” grape illustration, and “Sauvignon Blanc” text on a dark background."
      />
      <h3 class="best-deals__carousel-item__name">Sauvignon-Blanc</h3>
      <p class="best-deals__carousel-item__price">12,00 USD</p>
      <button class="best-deals__carousel-item__button">Add to Cart</button>
    </article>
    <article class="best-deals__carousel-item">
      <img
        width="360"
        class="best-deals__carousel-item__image"
        src="img/wines/Syrah.jpg"
        alt="Bottle of red wine with a white label reading “WINE” grape illustration, and “Syrah” text on a dark background."
      />
      <h3 class="best-deals__carousel-item__name">Syrah</h3>
      <p class="best-deals__carousel-item__price">13,00 USD</p>
      <button class="best-deals__carousel-item__button">Add to Cart</button>
    </article>
    <article class="best-deals__carousel-item">
      <img
        width="360"
        class="best-deals__carousel-item__image"
        src="img/wines/Pinot-Grigio.jpg"
        alt="Bottle of white wine with a white label reading “WINE” grape illustration, and “Pinot Grigio” text on a dark background."
      />
      <h3 class="best-deals__carousel-item__name">Pinot-Grigio</h3>
      <p class="best-deals__carousel-item__price">10,00 USD</p>
      <button class="best-deals__carousel-item__button">Add to Cart</button>
    </article>
  </div>
</section>
